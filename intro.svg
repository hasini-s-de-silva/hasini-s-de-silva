<svg viewBox="0 0 760 96" xmlns="http://www.w3.org/2000/svg" width="760" role="img" aria-label="Bridging biology and computation">
  <defs>
    <linearGradient id="s" x1="0" y1="0" x2="760" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12235F"/>
      <stop offset="0.5" stop-color="#2E5FE8"/>
      <stop offset="1" stop-color="#7C4DFF"/>
    </linearGradient>
  </defs>

  <!-- pill / bubble -->
  <rect x="3" y="3" width="754" height="90" rx="45" fill="#F1F4FE" stroke="url(#s)" stroke-width="2"/>

  <!-- live status dot -->
  <circle cx="54" cy="48" r="6" fill="#2E5FE8">
    <animate attributeName="opacity" values="1;0.25;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>

  <!-- cycling tagline -->
  <g font-family="Georgia, 'Times New Roman', serif" font-weight="600" font-size="27" text-anchor="middle" fill="#12235F">
    <text x="394" y="57" opacity="1">Bridging biology and computation
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.28;0.34;0.94;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="394" y="57" opacity="0">Fluent in the science, fluent in the code
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.28;0.34;0.61;0.67;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="394" y="57" opacity="0">AI systems for drug discovery &amp; genomics
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.61;0.67;0.94;1" dur="9s" repeatCount="indefinite"/>
    </text>
  </g>
</svg>
